<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GINA — FC Outreach Templates</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D1F3C; --navy-mid:#162D52; --navy-light:#1E3A6A;
  --gold:#C9A84C; --gold-light:#E8C97A; --gold-dim:rgba(201,168,76,0.25);
  --white:#FFFFFF; --offwhite:#F8F6F1; --text-body:#2C3E50;
  --text-muted:#7F8C9A; --border:#E2DDD5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text-body);min-height:100vh;}
.header{background:linear-gradient(135deg,#0D1F3C 0%,#1A3260 60%,#0D1F3C 100%);padding:0 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);height:64px;}
.header-left{display:flex;align-items:center;gap:16px;}
.aag-logo{height:40px;width:40px;object-fit:contain;}
.header-brand{display:flex;flex-direction:column;}
.header-brand-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--white);letter-spacing:0.06em;line-height:1;}
.header-brand-sub{font-size:10px;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;}
.header-sep{width:1px;height:28px;background:rgba(255,255,255,0.2);}
.header-title{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.1em;text-transform:uppercase;font-weight:500;}
.header-badge{background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:3px;}
.insurer-strip{background:var(--white);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:8px;overflow-x:auto;}
.strip-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;margin-right:4px;}
.strip-btn{display:flex;align-items:center;justify-content:center;height:38px;min-width:70px;padding:0 10px;background:var(--offwhite);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.strip-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.06);}
.strip-btn.active{border-color:var(--gold);background:rgba(201,168,76,0.12);box-shadow:0 0 0 1px var(--gold);}
.strip-btn img{height:22px;max-width:68px;object-fit:contain;}
.strip-btn.all-text{font-size:12px;font-weight:700;color:var(--text-muted);font-family:'DM Sans',sans-serif;}
.strip-btn.all-text.active{color:var(--navy);}
.toolbar{background:var(--white);padding:10px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600;}
.filter-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-weight:500;}
.filter-btn:hover{border-color:var(--gold);color:var(--navy);}
.filter-btn.active{background:var(--navy);border-color:var(--navy);color:var(--white);}
.toolbar-right{margin-left:auto;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--offwhite);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;}
.search-box input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-body);outline:none;width:150px;}
.search-box input::placeholder{color:var(--text-muted);}
.main{padding:24px 32px;max-width:1200px;margin:0 auto;}
.insurer-section{margin-bottom:30px;}
.insurer-section-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.ins-logo-wrap{background:var(--navy);padding:5px 12px;border-radius:6px;display:flex;align-items:center;height:38px;}
.ins-logo-wrap.light{background:var(--offwhite);border:1px solid var(--border);}
.ins-logo-wrap img{height:22px;max-width:90px;object-fit:contain;}
.ins-count{font-size:12px;color:var(--text-muted);}
.ins-count span{font-weight:600;color:var(--navy);}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px;}
.promo-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow 0.2s,transform 0.15s;}
.promo-card:hover{box-shadow:0 4px 18px rgba(13,31,60,0.1);transform:translateY(-1px);}
.card-stripe{height:3px;}
.card-body{padding:14px 16px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.card-product{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
.card-occ{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:0.05em;}
.occ-holiday{background:#FFF3E0;color:#E65100;}
.occ-seasonal{background:#E8F5E9;color:#2E7D32;}
.occ-festive{background:#FCE4EC;color:#C2185B;}
.occ-always{background:#EDE7F6;color:#512DA8;}
.card-headline{font-family:'Playfair Display',serif;font-size:13px;color:var(--navy);line-height:1.35;margin-bottom:9px;}
.card-offer-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.offer-pill{background:var(--navy);color:var(--gold-light);font-size:12px;font-weight:700;padding:3px 9px;border-radius:4px;}
.offer-sub{font-size:11px;color:var(--text-muted);}
.card-preview{font-size:11.5px;color:var(--text-muted);line-height:1.6;border-left:2px solid var(--gold-dim);padding-left:9px;font-style:italic;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-actions{display:flex;gap:7px;}
.btn-wa,.btn-more{flex:1;padding:7px 0;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-wa{background:#25D366;color:var(--white);}
.btn-wa:hover{background:#20BA59;}
.btn-wa.copied{background:#1B7A3E;}
.btn-more{background:var(--navy);color:var(--white);}
.btn-more:hover{background:var(--navy-light);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,0.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(13,31,60,0.3);}
.modal-header{background:linear-gradient(135deg,#0D1F3C 0%,#1A3260 100%);padding:16px 20px;border-radius:14px 14px 0 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:2px solid var(--gold);}
.modal-header-left{display:flex;align-items:center;gap:12px;}
.modal-ins-logo{height:26px;max-width:80px;object-fit:contain;background:var(--white);padding:3px 8px;border-radius:4px;}
.modal-header-text h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--white);line-height:1.3;}
.modal-header-text p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;}
.modal-close{background:rgba(255,255,255,0.12);border:none;color:var(--white);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-body{padding:20px;}
.ch-tabs{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.ch-tab{flex:1;padding:8px 0;background:transparent;border:none;border-right:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.ch-tab:last-child{border-right:none;}
.ch-tab:hover{background:var(--offwhite);color:var(--navy);}
.ch-tab.active{background:var(--navy);color:var(--white);}
.msg-box{background:var(--offwhite);border:1.5px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.75;color:var(--text-body);white-space:pre-wrap;min-height:160px;display:none;}
.msg-box.active{display:block;}
.modal-actions{display:flex;gap:10px;margin-top:14px;}
.btn-copy-modal,.btn-wa-modal{flex:1;padding:10px 0;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-copy-modal{background:var(--navy);color:var(--white);}
.btn-copy-modal.copied{background:#1B7A3E;}
.btn-wa-modal{background:#25D366;color:var(--white);}
.btn-wa-modal:hover{background:#20BA59;}
.expiry{font-size:11px;color:var(--text-muted);text-align:center;margin-top:10px;}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;}
.footer{background:var(--navy);border-top:1px solid rgba(201,168,76,0.3);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;margin-top:32px;}
.footer-left{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.06em;}
.footer-left span{color:var(--gold);}
.footer-right{font-size:11px;color:rgba(255,255,255,0.3);}
</style>
</head>

let activeIns='all', activeProd='all', searchTerm='', currentPromo=null, activeCh='whatsapp';
const getIns = id => INSURERS.find(i=>i.id===id);

function filtered(){
  return PROMOS.filter(p=>{
    const mi=activeIns==='all'||p.insurer===activeIns;
    const mp=activeProd==='all'||p.product===activeProd;
    const ms=!searchTerm||p.headline.toLowerCase().includes(searchTerm)||p.offerSub.toLowerCase().includes(searchTerm);
    return mi&&mp&&ms;
  });
}

function selectInsurer(id,btn){
  activeIns=id;
  document.querySelectorAll('.strip-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterProd(p,btn){
  activeProd=p;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function doSearch(v){searchTerm=v.toLowerCase();renderCards();}

function renderCards(){
  const main=document.getElementById('mainContent');
  const promos=filtered();
  if(!promos.length){main.innerHTML='<div class="empty">No templates found.</div>';return;}
  if(activeIns==='all'){
    const byIns={};
    promos.forEach(p=>{if(!byIns[p.insurer])byIns[p.insurer]=[];byIns[p.insurer].push(p);});
    main.innerHTML=Object.entries(byIns).map(([ins,ps])=>{
      const d=getIns(ins);
      return `<div class="insurer-section">
        <div class="insurer-section-header">
          <div class="ins-logo-wrap ${d.dark?'light':''}"><img src="${LOGOS[ins]}" alt="${d.name}"></div>
          <span class="ins-count"><span>${ps.length}</span> template${ps.length>1?'s':''}</span>
        </div>
        <div class="card-grid">${ps.map(cardHTML).join('')}</div>
      </div>`;
    }).join('');
  } else {
    main.innerHTML=`<div class="card-grid">${promos.map(cardHTML).join('')}</div>`;
  }
}

function cardHTML(p){
  return `<div class="promo-card">
    <div class="card-stripe" style="background:${p.stripe}"></div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-product">${p.product}</span>
        <span class="card-occ ${p.occasionClass}">${p.occasionLabel}</span>
      </div>
      <div class="card-headline">${p.headline}</div>
      <div class="card-offer-row">
        <span class="offer-pill">${p.offer}</span>
        <span class="offer-sub">${p.offerSub}</span>
      </div>
      <div class="card-preview">${p.preview}</div>
      <div class="card-actions">
        <button class="btn-wa" id="wa-${p.id}" onclick="quickCopyWA(${p.id})">&#128172; Copy WhatsApp</button>
        <button class="btn-more" onclick="openModal(${p.id})">All Formats</button>
      </div>
    </div>
  </div>`;
}

function quickCopyWA(id){
  const p=PROMOS.find(x=>x.id===id);
  navigator.clipboard.writeText(p.channels.whatsapp).then(()=>{
    const btn=document.getElementById('wa-'+id);
    const orig=btn.innerHTML;
    btn.innerHTML='&#10003; Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied');},2000);
  });
}

function openModal(id){
  currentPromo=PROMOS.find(p=>p.id===id);
  activeCh='whatsapp';
  const ins=getIns(currentPromo.insurer);
  document.getElementById('modalTitle').textContent=currentPromo.headline;
  document.getElementById('modalSub').textContent=ins.name+' · '+currentPromo.product.toUpperCase();
  document.getElementById('modalLogo').src=LOGOS[currentPromo.insurer];
  document.getElementById('modalExpiry').textContent='⏱ '+currentPromo.expiry;
  const chs=[{id:'whatsapp',label:'&#128172; WhatsApp'},{id:'sms',label:'&#128241; SMS'},{id:'email',label:'&#128231; Email'}];
  document.getElementById('chTabs').innerHTML=chs.map(c=>`<button class="ch-tab ${c.id==='whatsapp'?'active':''}" onclick="switchCh('${c.id}',this)">${c.label}</button>`).join('');
  document.getElementById('msgBoxes').innerHTML=chs.map(c=>`<div class="msg-box ${c.id==='whatsapp'?'active':''}" id="msgbox-${c.id}">${currentPromo.channels[c.id]}</div>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function switchCh(ch,btn){
  activeCh=ch;
  document.querySelectorAll('.ch-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.msg-box').forEach(b=>b.classList.remove('active'));
  document.getElementById('msgbox-'+ch).classList.add('active');
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');}

function copyModal(){
  navigator.clipboard.writeText(currentPromo.channels[activeCh]).then(()=>{
    const btn=document.getElementById('btnCopyModal');
    btn.textContent='&#10003; Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='&#128203; Copy Message';btn.classList.remove('copied');},2000);
  });
}

function sendWA(){window.open('https://wa.me/?text='+encodeURIComponent(currentPromo.channels.whatsapp),'_blank');}

renderCards();
</script>
</body>
</html>
