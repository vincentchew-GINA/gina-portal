<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0D1F3C;
  --navy-mid: #162D52;
  --navy-light: #1E3A6A;
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dim: rgba(201,168,76,0.25);
  --white: #FFFFFF;
  --offwhite: #F8F6F1;
  --text-body: #2C3E50;
  --text-muted: #7F8C9A;
  --border: #E2DDD5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--offwhite); color: var(--text-body); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--navy);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.04em; }
.header-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.2); }
.header-title { font-size: 12px; color: rgba(255,255,255,0.65); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
.header-badge { background: var(--gold); color: var(--navy); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 62px); }

/* SIDEBAR */
.sidebar {
  width: 200px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 0;
  height: calc(100vh - 62px);
  overflow-y: auto;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 18px 10px;
}
.insurer-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 18px;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.insurer-btn:hover { background: var(--offwhite); color: var(--navy); }
.insurer-btn.active { background: rgba(13,31,60,0.05); border-left-color: var(--gold); color: var(--navy); font-weight: 600; }
.insurer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.insurer-count {
  margin-left: auto;
  background: var(--offwhite);
  border: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-muted);
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
}
.insurer-btn.active .insurer-count { background: var(--navy); color: var(--white); border-color: var(--navy); }
.sidebar-divider { height: 1px; background: var(--border); margin: 10px 18px; }
.all-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 18px;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  margin-bottom: 6px;
}
.all-btn:hover { background: var(--offwhite); color: var(--navy); }
.all-btn.active { background: rgba(13,31,60,0.05); border-left-color: var(--gold); color: var(--navy); font-weight: 600; }

/* MAIN */
.main { flex: 1; padding: 28px 32px; overflow-y: auto; }
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title-wrap h2 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--navy); }
.section-title-wrap p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
}
.search-box input {
  border: none; background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--text-body); outline: none; width: 180px;
}
.search-box input::placeholder { color: var(--text-muted); }

/* INSURER SECTION */
.insurer-section { margin-bottom: 36px; }
.insurer-section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.insurer-logo-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--navy);
  padding: 6px 14px;
  border-radius: 6px;
}
.insurer-logo-dot { width: 10px; height: 10px; border-radius: 50%; }
.insurer-logo-name { font-size: 13px; font-weight: 700; color: var(--white); letter-spacing: 0.06em; }
.insurer-section-count { font-size: 12px; color: var(--text-muted); }
.insurer-section-count span { font-weight: 600; color: var(--navy); }

/* CARD GRID */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

/* PROMO CARD */
.promo-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s;
}
.promo-card:hover { box-shadow: 0 4px 20px rgba(13,31,60,0.09); transform: translateY(-1px); }
.card-stripe { height: 3px; }
.card-body { padding: 16px 18px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.card-product {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-muted);
}
.card-occ {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em;
}
.occ-holiday { background: #FFF3E0; color: #E65100; }
.occ-seasonal { background: #E8F5E9; color: #2E7D32; }
.occ-festive { background: #FCE4EC; color: #C2185B; }
.occ-always { background: #EDE7F6; color: #512DA8; }

.card-headline { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--navy); line-height: 1.35; margin-bottom: 10px; }
.card-offer-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.offer-pill {
  background: var(--navy);
  color: var(--gold-light);
  font-size: 13px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 5px;
  letter-spacing: 0.02em;
}
.offer-sub { font-size: 11px; color: var(--text-muted); }
.card-preview {
  font-size: 12px; color: var(--text-muted); line-height: 1.6;
  border-left: 2px solid var(--gold-dim); padding-left: 10px;
  font-style: italic; margin-bottom: 14px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-actions { display: flex; gap: 8px; }
.btn-wa, .btn-more {
  flex: 1; padding: 8px 0; border-radius: 6px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
}
.btn-wa { background: #25D366; color: var(--white); display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-wa:hover { background: #20BA59; }
.btn-wa.copied { background: #2E7D32; }
.btn-more { background: var(--navy); color: var(--white); }
.btn-more:hover { background: var(--navy-light); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(13,31,60,0.55); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 14px;
  width: 100%; max-width: 580px; max-height: 88vh;
  overflow-y: auto; box-shadow: 0 24px 64px rgba(13,31,60,0.28);
}
.modal-header {
  background: var(--navy); padding: 18px 22px;
  border-radius: 14px 14px 0 0;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;

.modal-header h3 { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--white); line-height: 1.3; }
.modal-header p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 3px; }
.modal-close {
  background: rgba(255,255,255,0.12); border: none; color: var(--white);
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.modal-body { padding: 22px; }

/* CHANNEL TABS */
.ch-tabs { display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.ch-tab {
  flex: 1; padding: 9px 0; background: transparent;
  border: none; font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
  border-right: 1px solid var(--border);

.ch-tab:last-child { border-right: none; }
.ch-tab:hover { background: var(--offwhite); color: var(--navy); }
.ch-tab.active { background: var(--navy); color: var(--white); }

.msg-box {
  background: var(--offwhite); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 16px; font-size: 13px;
  line-height: 1.75; color: var(--text-body); white-space: pre-wrap;
  min-height: 180px; display: none; font-family: 'DM Sans', sans-serif;

.msg-box.active { display: block; }

.modal-actions { display: flex; gap: 10px; margin-top: 14px; }
.btn-copy-modal, .btn-wa-modal {
  flex: 1; padding: 11px 0; border-radius: 8px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-copy-modal { background: var(--navy); color: var(--white); }
.btn-copy-modal:hover { background: var(--navy-light); }
.btn-copy-modal.copied { background: #2E7D32; }
.btn-wa-modal { background: #25D366; color: var(--white); display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-wa-modal:hover { background: #20BA59; }
.expiry { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 10px; }

.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
</style>
</head>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

    occasion: 'seasonal', occasionLabel: 'Seasonal', occasionClass: 'occ-seasonal',
    stripe: '#7B1FA2',
    expiry: 'Seasonal promo — confirm dates with ops',
    preview: 'Income Insurance is bundling a free smart home device with their enhanced home plan — great hook for tech-savvy homeowners...',
    channels: {
      whatsapp: `Hi [Name] 👋

Something a bit different for homeowners! 🏠

🔒 *Income Insurance — Enhanced Home + Free Smart Device*
✅ Comprehensive home contents & fire cover
✅ Free smart home sensor bundled in
✅ Water damage, renovation cover option
✅ New homeowner? Perfect timing

A nice value-add on top of solid home coverage. Want me to get you a quick quote?

[Your Name] | AAG Financial Advisers`,
      sms: `Hi [Name], Income Insurance: Enhanced Home plan + FREE smart home device. Great for new homeowners. Want a quote? – [Your Name], AAG`,
      email: `Subject: Home Insurance + Free Smart Device — Income Insurance Promotion

Hi [Name],

A home insurance promotion worth sharing, especially for newer homeowners:

🏡 Income Insurance Enhanced Home Plan — Free smart home sensor bundle included
Covers contents, fire, water damage, with renovation cover available.

The smart device add-on is a nice touch. Happy to run a quick quote if you're interested.

Best regards,
[Your Name]
Financial Consultant, AAG Financial Advisers`
    }
  }
];

let activeInsurer = 'all';
let searchTerm = '';
let currentPromo = null;
let activeChannel = 'whatsapp';

function getInsurer(id) { return INSURERS.find(i => i.id === id); }

function buildSidebar() {
  const nav = document.getElementById('insurerNav');
  nav.innerHTML = INSURERS.map(ins => {
    const count = PROMOS.filter(p => p.insurer === ins.id).length;
    return `<button class="insurer-btn" onclick="selectInsurer('${ins.id}', this)" data-insurer="${ins.id}">
      <span class="insurer-dot" style="background:${ins.color}"></span>
      ${ins.name}
      <span class="insurer-count" id="count-${ins.id}">${count}</span>
    </button>`;
  }).join('');
  document.getElementById('count-all').textContent = PROMOS.length;
}

function selectInsurer(id, btn) {
  activeInsurer = id;
  document.querySelectorAll('.insurer-btn, .all-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const ins = id === 'all' ? null : getInsurer(id);
  document.getElementById('sectionTitle').textContent = ins ? ins.name : 'All Insurers';
  renderCards();
}

function doSearch(val) {
  searchTerm = val.toLowerCase();
  renderCards();
}

function filtered() {
  return PROMOS.filter(p => {
    const matchInsurer = activeInsurer === 'all' || p.insurer === activeInsurer;
    const matchSearch = !searchTerm ||
      p.headline.toLowerCase().includes(searchTerm) ||
      p.product.toLowerCase().includes(searchTerm) ||
      getInsurer(p.insurer).name.toLowerCase().includes(searchTerm);
    return matchInsurer && matchSearch;
  });
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const promos = filtered();

  if (promos.length === 0) {
    container.innerHTML = '<div class="empty">No templates found.</div>';
    return;
  }

  if (activeInsurer === 'all') {
    // Group by insurer
    const byInsurer = {};
    promos.forEach(p => {
      if (!byInsurer[p.insurer]) byInsurer[p.insurer] = [];
      byInsurer[p.insurer].push(p);
    });
    container.innerHTML = Object.entries(byInsurer).map(([ins, ps]) => {
      const insData = getInsurer(ins);
      return `<div class="insurer-section">
        <div class="insurer-section-header">
          <div class="insurer-logo-pill">
            <span class="insurer-logo-dot" style="background:${insData.color}"></span>
            <span class="insurer-logo-name">${insData.name}</span>
          </div>
          <span class="insurer-section-count"><span>${ps.length}</span> template${ps.length > 1 ? 's' : ''}</span>
        </div>
        <div class="card-grid">${ps.map(cardHTML).join('')}</div>
      </div>`;
    }).join('');
  } else {
    container.innerHTML = `<div class="card-grid">${promos.map(cardHTML).join('')}</div>`;
  }
}

function cardHTML(p) {
  return `<div class="promo-card">
    <div class="card-stripe" style="background:${p.stripe}"></div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-product">${p.product}</span>
        <span class="card-occ ${p.occasionClass}">${p.occasionLabel}</span>
      </div>
      <div class="card-headline">${p.headline}</div>
      <div class="card-offer-row">
        <span class="offer-pill">${p.offer}</span>
        <span class="offer-sub">${p.offerSub}</span>
      </div>
      <div class="card-preview">${p.preview}</div>
      <div class="card-actions">
        <button class="btn-wa" id="wa-${p.id}" onclick="quickCopyWA(${p.id})">💬 Copy WhatsApp</button>
        <button class="btn-more" onclick="openModal(${p.id})">All Formats</button>
      </div>
    </div>
  </div>`;
}

function quickCopyWA(id) {
  const p = PROMOS.find(x => x.id === id);
  navigator.clipboard.writeText(p.channels.whatsapp).then(() => {
    const btn = document.getElementById('wa-' + id);
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function openModal(id) {
  currentPromo = PROMOS.find(p => p.id === id);
  activeChannel = 'whatsapp';
  const ins = getInsurer(currentPromo.insurer);
  document.getElementById('modalTitle').textContent = currentPromo.headline;
  document.getElementById('modalSub').textContent = ins.name + ' · ' + currentPromo.product;
  document.getElementById('modalExpiry').textContent = '⏱ ' + currentPromo.expiry;

  const chs = [
    { id: 'whatsapp', label: '💬 WhatsApp' },
    { id: 'sms', label: '📱 SMS' },
    { id: 'email', label: '📧 Email' }
  ];
  document.getElementById('chTabs').innerHTML = chs.map(c =>
    `<button class="ch-tab ${c.id === 'whatsapp' ? 'active' : ''}" onclick="switchCh('${c.id}',this)">${c.label}</button>`
  ).join('');
  document.getElementById('msgBoxes').innerHTML = chs.map(c =>
    `<div class="msg-box ${c.id === 'whatsapp' ? 'active' : ''}" id="msgbox-${c.id}">${currentPromo.channels[c.id]}</div>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function switchCh(ch, btn) {
  activeChannel = ch;
  document.querySelectorAll('.ch-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.msg-box').forEach(b => b.classList.remove('active'));
  document.getElementById('msgbox-' + ch).classList.add('active');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

function copyModal() {
  navigator.clipboard.writeText(currentPromo.channels[activeChannel]).then(() => {
    const btn = document.getElementById('btnCopyModal');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy Message'; btn.classList.remove('copied'); }, 2000);
  });
}

function sendWA() {
  window.open('https://wa.me/?text=' + encodeURIComponent(currentPromo.channels.whatsapp), '_blank');
}

buildSidebar();
renderCards();
</script>
</body>
</html>
